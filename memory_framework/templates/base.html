<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Memory Framework" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ asset_url('css/agent_web.css') }}" rel="stylesheet">
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <header class="site-header">
        <div class="brand-block">
            <a class="brand-mark" href="{{ url_for('projects_page') }}">M</a>
            <div>
                <div class="eyebrow">Memory Framework Workspace</div>
                <div class="brand-title">{{ project.title if project else "多项目写作控制台" }}</div>
            </div>
        </div>

        <nav class="site-nav">
            <a class="{{ 'active' if section == 'projects' else '' }}" href="{{ url_for('projects_page') }}">项目</a>
            {% if project %}
            <a class="{{ 'active' if section == 'dashboard' else '' }}" href="{{ url_for('project_dashboard', project_id=project.id) }}">仪表盘</a>
            <a class="{{ 'active' if section == 'outline' else '' }}" href="{{ url_for('outline_page', project_id=project.id) }}">大纲</a>
            <a class="{{ 'active' if section == 'characters' else '' }}" href="{{ url_for('characters_page', project_id=project.id) }}">角色</a>
            <a class="{{ 'active' if section == 'chapters' else '' }}" href="{{ url_for('chapters_page', project_id=project.id) }}">章节</a>
            <a class="{{ 'active' if section == 'foreshadowing' else '' }}" href="{{ url_for('foreshadowing_page', project_id=project.id) }}">伏笔</a>
            <a class="{{ 'active' if section == 'schema' else '' }}" href="{{ url_for('schema_page', project_id=project.id) }}">状态定义</a>
            <a class="{{ 'active' if section == 'config' else '' }}" href="{{ url_for('config_page', project_id=project.id) }}">配置</a>
            {% endif %}
        </nav>

        {% if project %}
        <div class="project-pill">
            <span>进度</span>
            <strong>{{ project.chapter_count }}/{{ project.total_chapters }}</strong>
        </div>
        {% endif %}
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ asset_url('js/agent_web.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
